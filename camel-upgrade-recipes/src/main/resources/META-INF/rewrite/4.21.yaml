type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel421.migrateGrokDependency
displayName: Migrate camel-grok dependency to new library
description: Migrates the Grok library from unmaintained io.krakens:java-grok to its active fork io.github.whatap:java-grok.
recipeList:
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: io.krakens
      oldArtifactId: java-grok
      newGroupId: io.github.whatap
