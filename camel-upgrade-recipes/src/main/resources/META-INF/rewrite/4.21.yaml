## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_21.adoc#camel-aws2-s3
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel421.migrateAws2S3ListObjectsApi
displayName: Migrate camel-aws2-s3 listObjects to V2 API
description: Migrates ListObjectsRequest/Response to ListObjectsV2Request/Response for the listObjects operation (pojoRequest=true only).
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-aws2-s3
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: software.amazon.awssdk.services.s3.model.ListObjectsRequest
      newFullyQualifiedTypeName: software.amazon.awssdk.services.s3.model.ListObjectsV2Request
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: software.amazon.awssdk.services.s3.model.ListObjectsResponse
      newFullyQualifiedTypeName: software.amazon.awssdk.services.s3.model.ListObjectsV2Response
---
## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_21.adoc#error-registry
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel421.migrateErrorRegistryProperties
displayName: Migrate Error Registry configuration properties
description: Migrates Error Registry configuration from camel.main.errorRegistryXxx to camel.errorRegistry.* pattern in .properties files. Note - errorRegistryStackTraceEnabled is removed (always captures full exception now). YAML files require manual migration.
recipeList:
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: camel.main.errorRegistryEnabled
      newPropertyKey: camel.errorRegistry.enabled
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: camel.main.errorRegistryMaximumEntries
      newPropertyKey: camel.errorRegistry.maximumEntries
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: camel.main.errorRegistryTimeToLiveSeconds
      newPropertyKey: camel.errorRegistry.timeToLiveSeconds
  - org.openrewrite.properties.DeleteProperty:
      propertyKey: camel.main.errorRegistryStackTraceEnabled
