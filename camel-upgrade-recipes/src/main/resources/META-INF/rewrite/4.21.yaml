name: org.apache.camel.upgrade.camel421.upgradeOpensearchHeaders
displayName: Migrate camel-opensearch header constants to new naming convention
description: Renames OpenSearch header constants to CamelOpensearch* pattern only if camel-opensearch dependency is present. Note - DSL accessor methods (operation() → opensearchOperation(), indexId() → opensearchIndexId(), etc.) are NOT migrated and require manual update.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-opensearch
recipeList:
  - org.apache.camel.upgrade.camel421.RenameHeaders:
      headerMappings:
        operation: CamelOpensearchOperation
        indexId: CamelOpensearchIndexId
        indexName: CamelOpensearchIndexName
        documentClass: CamelOpensearchDocumentClass
        waitForActiveShards: CamelOpensearchWaitForActiveShards
        scrollKeepAliveMs: CamelOpensearchScrollKeepAliveMs
        useScroll: CamelOpensearchUseScroll
        size: CamelOpensearchSize
        from: CamelOpensearchFrom
---
