#####
# Update the Camel project from 4.20 to 4.21
#####
---
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel421.CamelMigrationRecipe
displayName: Migrates `camel 4.20` application to `camel 4.21`
description: Migrates `camel 4.20` application to `camel 4.21`.
recipeList:
  - org.apache.camel.upgrade.camel421.upgradeKafkaRecipes
  - org.apache.camel.upgrade.camel421.upgradeJGroupsHeaders
  - org.apache.camel.upgrade.camel421.upgradeDnsHeaders
  - org.apache.camel.upgrade.camel421.upgradeJiraHeaders
  - org.apache.camel.upgrade.camel421.upgradeCouchdbHeaders
  - org.apache.camel.upgrade.camel421.upgradeCouchbaseHeaders
  - org.apache.camel.upgrade.camel421.upgradeJGroupsRaftHeaders
  - org.apache.camel.upgrade.camel421.upgradeShiroHeaders
  - org.apache.camel.upgrade.camel421.upgradeElasticsearchRestClientHeaders
  - org.apache.camel.upgrade.camel421.upgradeSolrHeaders
  - org.apache.camel.upgrade.camel421.upgradeGitHub2Headers
  - org.apache.camel.upgrade.camel421.upgradeGoogleCloudHeaders
  - org.apache.camel.upgrade.camel421.upgradeMongoDbGridFsHeaders
  - org.apache.camel.upgrade.camel421.upgradeIrcHeaders
---
## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_21.adoc#camel-kafka---potential-breaking-change
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel421.upgradeKafkaRecipes
displayName: Migrate camel-kafka headers
description: Renames Kafka header constants only if camel-kafka dependency is present.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-kafka
recipeList:
  - org.apache.camel.upgrade.camel421.RenameHeaders:
      headerMappings:
        kafka.PARTITION_KEY: CamelKafkaPartitionKey
        kafka.PARTITION: CamelKafkaPartition
        kafka.KEY: CamelKafkaKey
        kafka.TOPIC: CamelKafkaTopic
        kafka.OVERRIDE_TOPIC: CamelKafkaOverrideTopic
        kafka.OFFSET: CamelKafkaOffset
        kafka.HEADERS: CamelKafkaHeaders
        kafka.LAST_RECORD_BEFORE_COMMIT: CamelKafkaLastRecordBeforeCommit
        kafka.LAST_POLL_RECORD: CamelKafkaLastPollRecord
        kafka.TIMESTAMP: CamelKafkaTimestamp
        kafka.OVERRIDE_TIMESTAMP: CamelKafkaOverrideTimestamp
        kafka.RECORD_META: CamelKafkaRecordMeta
---
