        RETURN_LUCENE_DOCS: CamelLuceneReturnLuceneDocs
---
## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_18.adoc#camel-openstack-potential-breaking-change
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel418_3.upgradeOpenstackHeaders
displayName: Migrate camel-openstack header constants to new naming convention
description: Renames OpenStack-specific header constants to CamelOpenstack* pattern only if camel-openstack dependency is present. Generic headers (*Id, *Name, containerName, objectName, imageRef, interfaceType, ipVersion) are excluded to prevent false positives.
preconditions:
