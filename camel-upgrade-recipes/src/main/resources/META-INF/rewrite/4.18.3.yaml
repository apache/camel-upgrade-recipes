#####
# Rules coming from https://camel.apache.org/manual/camel-4x-upgrade-guide-4_18.html
# Specifically changes introduced in 4.18.3 (upgrading from 4.18.1 to 4.18.3)
#####

#####
# Update the Camel project from 4.18.1 to 4.18.3
#####
---
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel418_3.CamelMigrationRecipe
displayName: Migrates `camel 4.18.1` application to `camel 4.18.3`
description: Migrates `camel 4.18.1` application to `camel 4.18.3`. Header rename changes were introduced in 4.18.x.
recipeList:
  # Header renames
  - org.apache.camel.upgrade.camel418_3.upgradeKafkaRecipes
  - org.apache.camel.upgrade.camel418_3.upgradeJGroupsHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeDnsHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeJiraHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeJGroupsRaftHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeShiroHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeElasticsearchRestClientHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeSolrHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeGitHub2Headers
  - org.apache.camel.upgrade.camel418_3.upgradeGoogleCloudHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeMongoDbGridFsHeaders
  # Partial automation - header string literals migrated, DSL accessor methods require manual update
  - org.apache.camel.upgrade.camel418_3.upgradeLuceneHeaders
  - org.apache.camel.upgrade.camel418_3.upgradePdfHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeArangoDbHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeJt400Headers
  - org.apache.camel.upgrade.camel418_3.upgradeMailHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeMiloHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeElasticsearchHeaders
  - org.apache.camel.upgrade.camel418_3.upgradeOpensearchHeaders
  # Other migrations
  - org.apache.camel.upgrade.camel418_3.migrateGithubToGithub2
---
## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_21.adoc#camel-kafka---potential-breaking-change
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel418_3.upgradeKafkaRecipes
displayName: Migrate camel-kafka headers
description: Renames Kafka header constants only if camel-kafka dependency is present.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-kafka
recipeList:
  - org.apache.camel.upgrade.camel421.RenameHeaders:
      headerMappings:
        kafka.PARTITION_KEY: CamelKafkaPartitionKey
        kafka.PARTITION: CamelKafkaPartition
        kafka.KEY: CamelKafkaKey
        kafka.TOPIC: CamelKafkaTopic
        kafka.OVERRIDE_TOPIC: CamelKafkaOverrideTopic
        kafka.OFFSET: CamelKafkaOffset
        kafka.HEADERS: CamelKafkaHeaders
        kafka.LAST_RECORD_BEFORE_COMMIT: CamelKafkaLastRecordBeforeCommit
        kafka.LAST_POLL_RECORD: CamelKafkaLastPollRecord
        kafka.TIMESTAMP: CamelKafkaTimestamp
        kafka.OVERRIDE_TIMESTAMP: CamelKafkaOverrideTimestamp
        kafka.RECORD_META: CamelKafkaRecordMeta
---
