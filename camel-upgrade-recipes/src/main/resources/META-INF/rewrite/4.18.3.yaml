      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-openstack
recipeList:
  - org.apache.camel.upgrade.camel421.RenameHeaders:
      headerMappings:
        FlavorId: CamelOpenstackNovaFlavorId
        RAM: CamelOpenstackNovaRam
        VCPU: CamelOpenstackNovaVcpu
        rxtxFactor: CamelOpenstackNovaRxtxFactor
        AdminPassword: CamelOpenstackNovaAdminPassword
        KeypairName: CamelOpenstackNovaKeypairName
        volumeType: CamelOpenstackCinderVolumeType
        isBootable: CamelOpenstackCinderIsBootable
        diskFormat: CamelOpenstackGlanceDiskFormat
        containerFormat: CamelOpenstackGlanceContainerFormat
        isPublic: CamelOpenstackGlanceIsPublic
        minRam: CamelOpenstackGlanceMinRam
        minDisk: CamelOpenstackGlanceMinDisk
        adminStateUp: CamelOpenstackNeutronAdminStateUp
        networkType: CamelOpenstackNeutronNetworkType
        physicalNetwork: CamelOpenstackNeutronPhysicalNetwork
        segmentId: CamelOpenstackNeutronSegmentId
        isShared: CamelOpenstackNeutronIsShared
        isRouterExternal: CamelOpenstackNeutronIsRouterExternal
        enableDHCP: CamelOpenstackNeutronEnableDhcp
        cidr: CamelOpenstackNeutronCidr
        subnetPools: CamelOpenstackNeutronSubnetPools
        macAddress: CamelOpenstackNeutronMacAddress
        end_marker: CamelOpenstackSwiftEndMarker
---
## https://github.com/apache/camel/blob/main/docs/user-manual/modules/ROOT/pages/camel-4x-upgrade-guide-4_18.adoc#camel-web3j-potential-breaking-change
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel418_3.upgradeWeb3jHeaders
displayName: Migrate camel-web3j header constants to new naming convention
description: Renames Web3j-specific header constants to CamelWeb3j* pattern only if camel-web3j dependency is present. Generic headers without clear blockchain context (ADDRESS, ADDRESSES, POSITION, SOURCE_CODE, DATABASE_NAME, KEY_NAME, CLIENT_ID, PRIORITY, TTL, ERROR_CODE, ERROR_DATA, ERROR_MESSAGE, TOPICS, FILTER_ID) are excluded to prevent false positives. Note - DSL accessor renames and operation semantics still require manual review.
preconditions:
  - org.openrewrite.java.dependencies.search.ModuleHasDependency:
      groupIdPattern: org.apache.camel
      artifactIdPattern: camel-web3j
recipeList:
  - org.apache.camel.upgrade.camel421.RenameHeaders:
      headerMappings:
        AT_BLOCK: CamelWeb3jAtBlock
        FROM_ADDRESS: CamelWeb3jFromAddress
        TO_ADDRESS: CamelWeb3jToAddress
        BLOCK_HASH: CamelWeb3jBlockHash
        TRANSACTION_HASH: CamelWeb3jTransactionHash
        SHA3_HASH_OF_DATA_TO_SIGN: CamelWeb3jSha3HashOfDataToSign
        SIGNED_TRANSACTION_DATA: CamelWeb3jSignedTransactionData
        FULL_TRANSACTION_OBJECTS: CamelWeb3jFullTransactionObjects
        NONCE: CamelWeb3jNonce
        HEADER_POW_HASH: CamelWeb3jHeaderPowHash
        MIX_DIGEST: CamelWeb3jMixDigest
        GAS_PRICE: CamelWeb3jGasPrice
        GAS_LIMIT: CamelWeb3jGasLimit
        FROM_BLOCK: CamelWeb3jFromBlock
        TO_BLOCK: CamelWeb3jToBlock
        PRIVATE_FOR: CamelWeb3jPrivateFor
        PRIVATE_FROM: CamelWeb3jPrivateFrom
        ETH_HASHRATE: CamelWeb3jEthHashrate