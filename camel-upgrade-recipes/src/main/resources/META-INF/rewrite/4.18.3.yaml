type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.camel418_3.migrateGithubToGithub2
displayName: Migrate camel-github to camel-github2
description: Migrates from deprecated camel-github artifact to camel-github2 (which is actually GitHub API v2). The component name remains 'github' in routes.
recipeList:
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: org.apache.camel
      oldArtifactId: camel-github
      newGroupId: org.apache.camel
      newArtifactId: camel-github2
