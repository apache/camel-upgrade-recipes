---
type: specs.openrewrite.org/v1beta/recipe
name: org.apache.camel.upgrade.Camel418LTSMigrationRecipe
displayName: Migrate to Camel 4.18.3 LTS
description: Migrates Apache Camel application to 4.18.3 LTS. This recipe aggregates all migration steps from 4.17.x to 4.18.3, including changes introduced in 4.18.0, 4.18.1, and 4.18.3.
recipeList:
  # 4.17 -> 4.18.0
  - org.apache.camel.upgrade.camel418.CamelMigrationRecipe
  # 4.18.0 -> 4.18.1 (from 4.19 recipes - these were backported)
  - org.apache.camel.upgrade.camel419.removedComponents
  - org.apache.camel.upgrade.camel419.XmlDsl419SagaRecipe
  - org.apache.camel.upgrade.camel419.YamlDsl419SagaRecipe
  - org.apache.camel.upgrade.camel419.YamlDsl419RoutePolicyRecipe
  # 4.18.1 -> 4.18.3 (header renames from 4.21 - these were backported)
  - org.apache.camel.upgrade.camel418_3.CamelMigrationRecipe
  # Update all Camel dependencies to 4.18.3
  - org.openrewrite.maven.UpgradeDependencyVersion:
      groupId: 'org.apache.camel'
      artifactId: '*'
      newVersion: 4.18.3
  - org.openrewrite.maven.UpgradePluginVersion:
      groupId: 'org.apache.camel'
      artifactId: '*'
      newVersion: 4.18.3
  - org.openrewrite.maven.UpgradeParentVersion:
      groupId: 'org.apache.camel'
      artifactId: '*'
      newVersion: 4.18.3
